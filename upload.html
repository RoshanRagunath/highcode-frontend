<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload — HighCode</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #f0ede6;
      --accent: #c8f542;
      --muted: #444;
      --card: #141414;
      --danger: #f55c5c;
      --success: #c8f542;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,245,66,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,245,66,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 3rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(10,10,10,0.8);
      backdrop-filter: blur(12px);
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--fg);
    }
    .logo span { color: var(--accent); }

    .nav-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 8rem 2rem 4rem;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }
    h1 em { font-style: normal; color: var(--accent); }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: #888;
      line-height: 1.7;
      margin-bottom: 3rem;
      max-width: 52ch;
    }

    /* Drop zone */
    .dropzone {
      position: relative;
      border: 1.5px dashed rgba(200,245,66,0.25);
      border-radius: 12px;
      background: var(--card);
      padding: 3.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
    }
    .dropzone:hover {
      border-color: rgba(200,245,66,0.5);
      background: #181818;
    }
    .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(200,245,66,0.04);
      transform: scale(1.005);
    }
    .dropzone input[type=file] { display: none; }

    .dropzone-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
      opacity: 0.7;
    }
    .dropzone-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .dropzone-hint {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: #666;
      letter-spacing: 0.05em;
    }
    .dropzone-hint .pill {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      margin: 0 0.15rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 3px;
      color: #aaa;
    }

    /* Selected file */
    .file-preview {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      display: none;
      align-items: center;
      gap: 1rem;
    }
    .file-preview.visible { display: flex; }
    .file-icon {
      width: 40px; height: 40px;
      border-radius: 6px;
      background: rgba(200,245,66,0.1);
      color: var(--accent);
      display: grid; place-items: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .file-meta { flex: 1; min-width: 0; }
    .file-name {
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-size {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: #777;
      margin-top: 0.15rem;
    }
    .file-remove {
      background: none;
      border: none;
      color: #777;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0.25rem 0.5rem;
      transition: color 0.15s ease;
    }
    .file-remove:hover { color: var(--danger); }

    /* Actions */
    .actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary {
      background: var(--accent);
      color: #0a0a0a;
      box-shadow: 0 0 30px rgba(200,245,66,0.2);
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 0 40px rgba(200,245,66,0.4); }
    .btn-secondary {
      background: transparent;
      color: var(--fg);
      border-color: var(--muted);
    }
    .btn-secondary:hover:not(:disabled) { border-color: var(--fg); }

    /* Status */
    .status {
      margin-top: 2rem;
      padding: 1.25rem 1.5rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
      background: var(--card);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      display: none;
    }
    .status.visible { display: block; }
    .status.error { border-color: rgba(245,92,92,0.3); color: var(--danger); }
    .status.success { border-color: rgba(200,245,66,0.3); }
    .status.loading { color: #aaa; }

    .status-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .status.success .status-label { color: var(--accent); }
    .status.error .status-label { color: var(--danger); }

    .response-block {
      margin-top: 0.75rem;
      padding: 0.85rem 1rem;
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: #ccc;
      max-height: 320px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(200,245,66,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
      vertical-align: -2px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    @media (max-width: 640px) {
      nav { padding: 1.25rem 1.5rem; }
      main { padding-top: 6rem; }
      .dropzone { padding: 2.5rem 1.25rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">High<span>Code</span></a>
    <div class="nav-tag">upload</div>
  </nav>

  <main>
    <div class="eyebrow">// upload your document</div>
    <h1>Send a file<br /><em>to the workflow.</em></h1>
    <p class="subtitle">
      Drop a PDF, Word doc, or text file and we'll forward it to the n8n pipeline.
      The processed response will appear below.
    </p>

    <label class="dropzone" id="dropzone">
      <input type="file" id="file-input" accept=".pdf,.doc,.docx,.txt,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain" />
      <div class="dropzone-icon">📤</div>
      <div class="dropzone-title">Drop a file here or click to browse</div>
      <div class="dropzone-hint">
        Accepted: <span class="pill">.pdf</span><span class="pill">.doc</span><span class="pill">.docx</span><span class="pill">.txt</span> · max 25 MB
      </div>
    </label>

    <div class="file-preview" id="file-preview">
      <div class="file-icon" id="file-icon">FILE</div>
      <div class="file-meta">
        <div class="file-name" id="file-name"></div>
        <div class="file-size" id="file-size"></div>
      </div>
      <button class="file-remove" id="file-remove" aria-label="Remove file">×</button>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="submit-btn" disabled>Send to workflow →</button>
      <button class="btn btn-secondary" id="reset-btn" type="button">Reset</button>
    </div>

    <div class="status" id="status"></div>
  </main>

  <footer>
    © 2026 HighCode · highcode.nl
  </footer>

  <script>
    // ──────────────────────────────────────────────────────────────
    // Configure your n8n webhook URL here.
    // In n8n: add a Webhook node, copy its Production URL, paste below.
    const WEBHOOK_URL = 'https://YOUR-N8N-INSTANCE/webhook/your-webhook-id';
    // ──────────────────────────────────────────────────────────────

    const MAX_BYTES = 25 * 1024 * 1024; // 25 MB
    const ACCEPTED_EXT = ['pdf', 'doc', 'docx', 'txt'];

    const dropzone   = document.getElementById('dropzone');
    const fileInput  = document.getElementById('file-input');
    const preview    = document.getElementById('file-preview');
    const fileName   = document.getElementById('file-name');
    const fileSize   = document.getElementById('file-size');
    const fileIcon   = document.getElementById('file-icon');
    const fileRemove = document.getElementById('file-remove');
    const submitBtn  = document.getElementById('submit-btn');
    const resetBtn   = document.getElementById('reset-btn');
    const statusEl   = document.getElementById('status');

    let currentFile = null;

    function formatBytes(b) {
      if (b < 1024) return b + ' B';
      if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
      return (b / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function extOf(name) {
      const m = name.toLowerCase().match(/\.([a-z0-9]+)$/);
      return m ? m[1] : '';
    }

    function setStatus(kind, label, body) {
      statusEl.className = 'status visible ' + kind;
      const labelHtml = kind === 'loading'
        ? `<span class="spinner"></span>${label}`
        : label;
      statusEl.innerHTML = `<div class="status-label">${labelHtml}</div>` +
        (body ? `<div class="response-block">${body}</div>` : '');
    }

    function clearStatus() {
      statusEl.className = 'status';
      statusEl.innerHTML = '';
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function selectFile(file) {
      if (!file) return;

      const ext = extOf(file.name);
      if (!ACCEPTED_EXT.includes(ext)) {
        setStatus('error', 'Unsupported file type',
          `.${ext || '(none)'} is not accepted. Use ${ACCEPTED_EXT.map(e => '.' + e).join(', ')}.`);
        return;
      }
      if (file.size > MAX_BYTES) {
        setStatus('error', 'File too large',
          `${formatBytes(file.size)} exceeds the 25 MB limit.`);
        return;
      }

      currentFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = `${formatBytes(file.size)} · ${file.type || ext.toUpperCase()}`;
      fileIcon.textContent = ext.toUpperCase();
      preview.classList.add('visible');
      submitBtn.disabled = false;
      clearStatus();
    }

    function reset() {
      currentFile = null;
      fileInput.value = '';
      preview.classList.remove('visible');
      submitBtn.disabled = true;
      clearStatus();
    }

    // Click-to-select is handled by <label> wrapping the input.
    fileInput.addEventListener('change', (e) => {
      selectFile(e.target.files[0]);
    });

    // Drag and drop
    ['dragenter', 'dragover'].forEach(ev => {
      dropzone.addEventListener(ev, (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropzone.classList.add('dragover');
      });
    });
    ['dragleave', 'drop'].forEach(ev => {
      dropzone.addEventListener(ev, (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (ev === 'dragleave' && e.target !== dropzone) return;
        dropzone.classList.remove('dragover');
      });
    });
    dropzone.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      if (file) {
        // Sync to input for accessibility / form semantics
        const dt = new DataTransfer();
        dt.items.add(file);
        fileInput.files = dt.files;
        selectFile(file);
      }
    });

    fileRemove.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      reset();
    });

    resetBtn.addEventListener('click', reset);

    submitBtn.addEventListener('click', async () => {
      if (!currentFile) return;

      if (WEBHOOK_URL.includes('YOUR-N8N-INSTANCE')) {
        setStatus('error', 'Webhook not configured',
          'Set the WEBHOOK_URL constant at the top of the script in upload.html.');
        return;
      }

      submitBtn.disabled = true;
      resetBtn.disabled  = true;
      setStatus('loading', `Uploading ${currentFile.name}…`);

      try {
        const formData = new FormData();
        formData.append('file', currentFile, currentFile.name);
        formData.append('filename', currentFile.name);
        formData.append('mimetype', currentFile.type || '');
        formData.append('size', String(currentFile.size));

        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          body: formData,
        });

        const contentType = res.headers.get('content-type') || '';
        let bodyText;
        if (contentType.includes('application/json')) {
          const json = await res.json();
          bodyText = JSON.stringify(json, null, 2);
        } else {
          bodyText = await res.text();
        }

        if (!res.ok) {
          setStatus('error', `Webhook returned ${res.status} ${res.statusText}`,
            escapeHtml(bodyText));
        } else {
          setStatus('success', 'Workflow response', escapeHtml(bodyText));
        }
      } catch (err) {
        setStatus('error', 'Network error', escapeHtml(err.message || String(err)));
      } finally {
        submitBtn.disabled = !currentFile;
        resetBtn.disabled  = false;
      }
    });
  </script>

</body>
</html>
