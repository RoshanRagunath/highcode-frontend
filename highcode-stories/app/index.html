<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload · Stories · HighCode</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav>
    <a href="/" class="logo">HighCode <em>Stories</em></a>
    <div class="nav-right">
      <span class="nav-tag">Upload</span>
      <a href="/history" class="nav-link">History</a>
    </div>
  </nav>

  <main>
    <header class="page-header">
      <div class="eyebrow">Upload</div>
      <h1>Drop a doc. <em>Get a backlog.</em></h1>
      <p class="lede">
        PDF, Word or Markdown. Stories land in the RN Jira project.
      </p>
    </header>

    <section id="dropzone" class="dropzone" tabindex="0" aria-label="Drop file here">
      <input id="fileInput" type="file" accept=".pdf,.docx,.md,.markdown" hidden />
      <div class="dropzone-inner">
        <div class="dropzone-icon" aria-hidden="true">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="square">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
        </div>
        <p class="dropzone-text">
          Drag a file here or
          <button type="button" class="link-btn" id="browseBtn">browse</button>
        </p>
        <p class="dropzone-hint">PDF · DOCX · MARKDOWN · max 10 MB</p>
      </div>
    </section>

    <section id="status" class="status" hidden></section>

    <section id="results" class="results" hidden>
      <div class="results-header">
        <span class="results-tag">Created</span>
        <h2>Issues</h2>
      </div>
      <div id="resultsBody"></div>
    </section>

    <section class="recent">
      <div class="recent-header">
        <div>
          <span class="recent-tag">Recent</span>
          <h2>Latest uploads</h2>
        </div>
        <button type="button" class="link-btn" id="refreshBtn">Refresh →</button>
      </div>
      <div id="historyBody">
        <p class="muted">Loading history…</p>
      </div>
      <div class="recent-footer">
        <a href="/history" class="link-btn">See full history →</a>
      </div>
    </section>
  </main>

  <footer>
    <div>© <a href="https://highcode.nl">HighCode</a></div>
    <div>stories.highcode.nl</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
